{{ define "index" }}
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>{{ .Head.Title }}</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="{{ .Head.StyleSheet }}" rel="stylesheet">

        {{ range .Head.Plugins }}
            {{ .PluginHead }}
        {{ end }}

        <script>
        window.addEventListener("DOMContentLoaded", () => {
            {{ range .Head.Plugins }}
                {{ .WindowLoadCode }}
            {{ end }}
        });
        </script>
    </head>
    <body>
        {{ .Content }}
    </body>
</html>
{{ end }}
